<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TG Business Bot 管理面板</title>
<meta name="description" content="Telegram Business Bot API 中转管理面板，支持 Bot API 10.0 全功能可视化操作。"/>
<meta property="og:title" content="TG Business Bot 管理面板"/>
<meta property="og:description" content="Telegram Business Bot API 中转服务，支持多用户连接、自动回复、Cron 定时消息"/>
<link rel="preconnect" href="https://cdn.tailwindcss.com"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<style>
*{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:#334155 transparent}
:root{--bg-base:#0f172a;--bg-card:#1e293b;--bg-input:#0f172a;--border:#334155;--text:#e2e8f0;--text-muted:#94a3b8;--text-dim:#475569}
.light,:root.light{--bg-base:#f8fafc;--bg-card:#ffffff;--bg-input:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--text-muted:#475569;--text-dim:#94a3b8}
body{background:var(--bg-base);color:var(--text);font-family:system-ui,sans-serif;margin:0;transition:background .3s,color .3s}
:root{--sb:260px}
.sidebar{width:var(--sb);height:100vh;background:var(--bg-card);border-right:1px solid var(--border);position:fixed;top:0;left:0;overflow:hidden;display:flex;flex-direction:column;z-index:40}
.main{margin-left:var(--sb);min-height:100vh}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem 1rem;border-radius:.5rem;font-size:.875rem;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}
.btn-secondary{background:#334155;color:#cbd5e1}.btn-secondary:hover{background:#475569}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#334155;color:#e2e8f0}
.btn-sm{padding:.3rem .7rem;font-size:.8rem}
.input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:.5rem;padding:.55rem .85rem;color:var(--text);font-size:.875rem;outline:none;transition:border-color .15s}
.input:focus{border-color:#3b82f6}.input::placeholder{color:#475569}
.badge{display:inline-flex;align-items:center;padding:.15rem .5rem;border-radius:9999px;font-size:.72rem;font-weight:600}
.badge-green{background:#052e16;color:#4ade80;border:1px solid #166534}
.badge-red{background:#450a0a;color:#f87171;border:1px solid #991b1b}
.badge-blue{background:#0c1a2e;color:#60a5fa;border:1px solid #1d4ed8}
.badge-yellow{background:#1c1002;color:#fbbf24;border:1px solid #854d0e}
.badge-gray{background:#1e293b;color:#94a3b8;border:1px solid #334155}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .9rem;border-radius:.5rem;cursor:pointer;font-size:.875rem;color:#94a3b8;transition:all .15s;margin:.1rem .5rem}
.nav-item:hover{background:#334155;color:#e2e8f0}
.nav-item.active{background:#1d4ed8;color:#fff}
.nav-item.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.chat-bubble-in{background:#1e293b;border:1px solid #334155;border-radius:1rem 1rem 1rem .3rem;align-self:flex-start;max-width:72%}
.chat-bubble-out{background:#1d4ed8;border-radius:1rem 1rem .3rem 1rem;align-self:flex-end;max-width:72%}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#1e293b;border:1px solid #334155;border-radius:1rem;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.tab{padding:.45rem 1rem;font-size:.875rem;cursor:pointer;border-radius:.4rem;color:#94a3b8;transition:.15s}
.tab.active{background:#1d4ed8;color:#fff}
.code-block{background:#0f172a;border:1px solid #334155;border-radius:.5rem;padding:1rem;font-family:monospace;font-size:.8rem;color:#94a3b8;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.right-chip{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:.4rem;font-size:.72rem;font-weight:500;border:1px solid}
.right-on{background:#052e16;color:#4ade80;border-color:#166534}
.right-off{background:#1e293b;color:#475569;border-color:#334155}
.spinner{width:1.2rem;height:1.2rem;border:2px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.tag{display:inline-block;padding:.1rem .45rem;background:#1e3a8a;color:#93c5fd;border-radius:.3rem;font-size:.72rem;margin:.1rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;padding:.8rem 1.2rem;border-radius:.6rem;font-size:.875rem;animation:slideIn .3s ease;max-width:320px}
@keyframes slideIn{from{transform:translateY(1rem);opacity:0}to{transform:translateY(0);opacity:1}}
#login-screen{position:fixed;inset:0;background:#0f172a;z-index:200;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-screen" style="display:none">
  <div class="card p-8 w-full max-w-sm mx-4">
    <div class="text-center mb-6">
      <div class="text-4xl mb-3">🤖</div>
      <h1 class="text-xl font-bold text-white">Business Bot 管理面板</h1>
      <p class="text-slate-400 text-sm mt-1">Telegram Bot API 10.0 · Business Bot</p>
    </div>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-slate-400 mb-1 block">访问密码</label>
        <input id="login-pwd" type="password" class="input" placeholder="ACCESS_PASSWORD" autofocus/>
      </div>
      <button id="login-btn" class="btn btn-primary w-full justify-center mt-2">进 入</button>
      <p id="login-err" class="text-red-400 text-sm text-center hidden"></p>
    </div>
    <p class="text-xs text-slate-600 text-center mt-4">密码通过 Cookie 保存，关闭浏览器后需重新登录</p>
  </div>
</div>

<!-- 主应用 -->
<div id="app" style="display:none">
  <aside class="sidebar flex flex-col">
    <div class="p-4 border-b border-slate-700">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-lg">🤖</span>
        <span id="bot-name" class="font-semibold text-white text-sm truncate">加载中…</span>
      </div>
      <p id="bot-username" class="text-xs text-slate-400 truncate"></p>
    </div>
    <div class="p-3 border-b border-slate-700">
      <p class="text-xs text-slate-500 mb-1.5 font-medium uppercase tracking-wide">当前连接</p>
      <select id="conn-select" class="input text-xs">
        <option value="">── 选择 Business 用户 ──</option>
      </select>
      <div id="rights-chips" class="flex flex-wrap gap-1 mt-2 hidden"></div>
    </div>
    <nav class="flex-1 p-2 space-y-0.5 overflow-y-auto">
      <p class="text-xs text-slate-600 px-2 pt-2 pb-1 font-medium uppercase tracking-wide">全局</p>
      <div class="nav-item" data-page="home">🏠 所有连接</div>
      <div class="nav-item" data-page="schedule">⏰ 定时消息</div>
      <div class="nav-item" data-page="docs">📖 API 文档</div>
      <div class="nav-item" data-page="logs">📊 操作日志</div>
      <div class="nav-item" data-page="settings">⚙️ 系统设置</div>
      <p class="text-xs text-slate-600 px-2 pt-3 pb-1 font-medium uppercase tracking-wide">当前用户</p>
      <div class="nav-item disabled" data-page="overview"  id="nav-overview">📋 概览</div>
      <div class="nav-item disabled" data-page="chats"     id="nav-chats">💬 聊天历史</div>
      <div class="nav-item disabled" data-page="send"      id="nav-send">✉️ 发消息</div>
      <div class="nav-item disabled" data-page="rules"     id="nav-rules">🤖 自动回复</div>
      <div class="nav-item disabled" data-page="profile"   id="nav-profile">👤 资料管理</div>
      <div class="nav-item disabled" data-page="gifts"     id="nav-gifts">🎁 礼物与星星</div>
      <div class="nav-item disabled" data-page="stories"   id="nav-stories">📸 动态管理</div>
    </nav>
    <div class="p-3 border-t border-slate-700">
      <button id="logout-btn" class="btn btn-ghost w-full justify-center btn-sm">退 出</button>
    </div>
  </aside>
  <main class="main" style="background:var(--bg-base)">
    <div class="sticky top-0 z-30 border-b px-6 py-3 flex items-center justify-between" style="background:var(--bg-base);border-color:var(--border)">
      <div id="page-title" class="font-semibold text-white text-base">所有连接</div>
      <div class="flex items-center gap-2">
        <span id="conn-badge" class="badge badge-gray hidden"></span>
        <button id="refresh-btn" class="btn btn-ghost btn-sm">↻ 刷新</button>
      </div>
    </div>
    <div id="page-content" class="p-6 max-w-5xl mx-auto"></div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-bg hidden">
  <div class="modal p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 id="modal-title" class="font-semibold text-white text-lg"></h2>
      <button id="modal-close" class="text-slate-400 hover:text-white text-xl leading-none">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// 状态（无需存储密码，Cookie 由浏览器自动管理）
// ══════════════════════════════════════════════════════════════════
const S = {
  conn: null,
  connList: [],
  page: 'home',
  chatId: null,
  dbError: null,
};

// ══════════════════════════════════════════════════════════════════
// API 工具（全部用 credentials:'include' 自动携带 Cookie）
// ══════════════════════════════════════════════════════════════════
async function api(path, opts = {}) {
  try {
    const r = await fetch(path, {
      ...opts,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    });
    if (r.status === 401) {
      // Cookie 过期，回到登录页
      showLogin();
      return { ok: false, error: 'Session expired' };
    }
    return await r.json();
  } catch (e) {
    return { ok: false, error: e.message };
  }
}
const GET  = path => api(path);
const POST = (path, body) => api(path, { method: 'POST', body: JSON.stringify(body) });
const PUT  = (path, body) => api(path, { method: 'PUT',  body: JSON.stringify(body) });
const DEL  = path => api(path, { method: 'DELETE' });

// ══════════════════════════════════════════════════════════════════
// 登录 / 登出
// ══════════════════════════════════════════════════════════════════
function showLogin() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pwd').value = '';
  document.getElementById('login-err').classList.add('hidden');
}

function showApp(botInfo) {
  if (botInfo?.first_name) {
    document.getElementById('bot-name').textContent = botInfo.first_name;
    document.getElementById('bot-username').textContent = botInfo.username ? '@' + botInfo.username : '';
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

document.getElementById('login-btn').onclick = async () => {
  const pwd = document.getElementById('login-pwd').value.trim();
  const errEl = document.getElementById('login-err');
  errEl.classList.add('hidden');
  if (!pwd) { errEl.textContent = '请输入密码'; errEl.classList.remove('hidden'); return; }

  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span> 验证中…';
  btn.disabled = true;

  try {
    const loginRes = await fetch('/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });

    if (!loginRes.ok) {
      btn.textContent = '进 入';
      btn.disabled = false;
      errEl.textContent = '密码错误，请重试';
      errEl.classList.remove('hidden');
      return;
    }

    // 登录成功：reload 让 window.load 用新 Cookie 重新检测并进入应用
    // 避免任何 DOM 状态冲突
    window.location.reload();
  } catch (e) {
    btn.textContent = '进 入';
    btn.disabled = false;
    errEl.textContent = '请求失败：' + e.message;
    errEl.classList.remove('hidden');
  }
};

document.getElementById('login-pwd').onkeydown = e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
};

document.getElementById('logout-btn').onclick = async () => {
  await fetch('/logout', { method: 'POST', credentials: 'include' });
  showLogin();
};

// ══════════════════════════════════════════════════════════════════
// 启动：检查 Cookie 是否有效，有则直接进入应用
// ══════════════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  const r = await fetch('/api/setup', { credentials: 'include' });
  if (r.ok) {
    const data = await r.json();
    if (data.ok) {
      showApp(data.result?.bot);
      navigate('home');           // 立即显示页面，不等 DB
      loadConnections();          // 后台异步加载连接列表（不阻塞进入）
      return;
    }
  }
  showLogin();
});

// ══════════════════════════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const colors = { info: 'bg-slate-700 text-white', ok: 'bg-green-800 text-green-200', err: 'bg-red-900 text-red-200' };
  const el = document.createElement('div');
  el.className = `toast ${colors[type] || colors.info}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ══════════════════════════════════════════════════════════════════
// Modal
// ══════════════════════════════════════════════════════════════════
function openModal(title, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal').onclick = e => { if (e.target === document.getElementById('modal')) closeModal(); };

// ══════════════════════════════════════════════════════════════════
// 连接管理
// ══════════════════════════════════════════════════════════════════
async function loadConnections() {
  const res = await GET('/api/connections');
  if (!res.ok) {
    S.connList = [];
    S.dbError = res.error || '加载失败';
    return;
  }
  S.dbError = null;
  S.connList = res.result || [];
  const sel = document.getElementById('conn-select');
  sel.innerHTML = '<option value="">── 选择 Business 用户 ──</option>';
  S.connList.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.user_name || c.user_id}${c.user_username ? ' (@' + c.user_username + ')' : ''}`;
    if (!c.is_enabled) opt.textContent += ' [已断开]';
    sel.appendChild(opt);
  });
}

document.getElementById('conn-select').onchange = async e => {
  const id = e.target.value;
  if (!id) {
    S.conn = null;
    document.getElementById('rights-chips').classList.add('hidden');
    updateNavByRights(null);
    document.getElementById('conn-badge').classList.add('hidden');
    return;
  }
  const res = await GET('/api/connections/' + id);
  if (!res.ok) return;
  S.conn = res.result;
  const rights = JSON.parse(S.conn.rights || '{}');
  renderRightsChips(rights);
  updateNavByRights(rights);
  const badge = document.getElementById('conn-badge');
  badge.textContent = S.conn.user_name || S.conn.user_id;
  badge.className = 'badge ' + (S.conn.is_enabled ? 'badge-green' : 'badge-red');
  badge.classList.remove('hidden');
  navigate('overview');
};

function renderRightsChips(rights) {
  const wrap = document.getElementById('rights-chips');
  wrap.innerHTML = '';
  // 严格对齐官方 BusinessBotRights 字段名
  const MAP = {
    can_reply:'回复消息', can_read_messages:'标记已读',
    can_delete_sent_messages:'删已发', can_delete_all_messages:'删所有消息',
    can_edit_name:'改名', can_edit_bio:'改简介', can_edit_profile_photo:'改头像', can_edit_username:'改用户名',
    can_view_gifts_and_stars:'看礼物', can_convert_gifts_to_stars:'换星星',
    can_change_gift_settings:'礼物设置', can_transfer_and_upgrade_gifts:'转让礼物',
    can_transfer_stars:'转星星', can_manage_stories:'动态',
  };
  Object.entries(MAP).forEach(([k,label]) => {
    const el = document.createElement('span');
    el.className = 'right-chip ' + (rights[k] ? 'right-on' : 'right-off');
    el.textContent = (rights[k] ? '✓ ' : '✗ ') + label;
    wrap.appendChild(el);
  });
  wrap.classList.remove('hidden');
}

function updateNavByRights(rights) {
  const r = rights || {};
  const has = (...keys) => keys.some(k => r[k]);
  const map = {
    'nav-overview': true,
    'nav-chats':   has('can_read_messages','can_reply'),
    'nav-send':    has('can_reply'),
    'nav-rules':   has('can_reply'),
    'nav-profile': has('can_edit_name','can_edit_bio','can_edit_profile_photo','can_edit_username'),
    'nav-gifts':   has('can_view_gifts_and_stars','can_convert_gifts_to_stars','can_transfer_stars'),
    'nav-stories': has('can_manage_stories'),
  };
  Object.entries(map).forEach(([id, enabled]) => {
    const el = document.getElementById(id);
    if (!rights) el.classList.add('disabled');
    else if (enabled) el.classList.remove('disabled');
    else el.classList.add('disabled');
  });
}

// ══════════════════════════════════════════════════════════════════
// 路由
// ══════════════════════════════════════════════════════════════════
const PAGE_TITLES = {
  home:'所有连接', overview:'连接概览', chats:'聊天历史', send:'发送消息',
  rules:'自动回复规则', profile:'资料管理', gifts:'礼物与星星',
  stories:'动态管理', schedule:'定时消息', docs:'API 文档',
  logs:'操作日志', settings:'系统设置',
};

function navigate(page) {
  S.page = page;
  S.chatId = null;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  render();
}

document.querySelectorAll('.nav-item').forEach(el => el.onclick = () => navigate(el.dataset.page));
document.getElementById('refresh-btn').onclick = async () => {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<span class="spinner" style="width:.9rem;height:.9rem;border-width:2px"></span>';
  btn.disabled = true;
  await render();
  btn.innerHTML = '↻ 刷新';
  btn.disabled = false;
};

async function render() {
  const pc = document.getElementById('page-content');
  pc.innerHTML = '<div class="flex justify-center pt-12"><span class="spinner" style="width:2rem;height:2rem;border-width:3px"></span></div>';
  try {
    const fns = {
      home:renderHome, overview:renderOverview, chats:renderChats,
      send:renderSend, rules:renderRules, profile:renderProfile,
      gifts:renderGifts, stories:renderStories, schedule:renderSchedule,
      docs:renderDocs, logs:renderLogs, settings:renderSettings,
    };
    const fn = fns[S.page];
    if (fn) await fn();
    else pc.innerHTML = '<p class="text-slate-400">页面不存在</p>';
  } catch (e) {
    console.error('[render]', S.page, e);
    pc.innerHTML = `<div class="card p-6 text-center">
      <p class="text-red-400 text-sm mb-2">页面加载失败：${esc(String(e))}</p>
      <button class="btn btn-secondary btn-sm" onclick="render()">↻ 重试</button>
    </div>`;
  }
}

// ══════════════════════════════════════════════════════════════════
// 工具函数
// ══════════════════════════════════════════════════════════════════
// ── 主题管理 ──────────────────────────────────────────────────────
function applyTheme(theme) {
  const root = document.documentElement;
  if (theme === 'dark') {
    root.classList.add('dark'); root.classList.remove('light');
  } else if (theme === 'light') {
    root.classList.remove('dark'); root.classList.add('light');
  } else {
    // system
    root.classList.remove('dark','light');
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) root.classList.add('dark');
  }
}
function setTheme(theme) {
  localStorage.setItem('tgp_theme', theme);
  applyTheme(theme);
  updateThemeBtns(theme);
  const labels = {dark:'当前：深色模式',light:'当前：浅色模式',system:'当前：跟随系统'};
  const el = document.getElementById('theme-current');
  if (el) el.textContent = labels[theme] || '';
}
function updateThemeBtns(theme) {
  ['dark','light','system'].forEach(t => {
    const btn = document.getElementById('theme-'+t);
    if (!btn) return;
    btn.className = 'btn flex-1 justify-center ' + (t === theme ? 'btn-primary' : 'btn-secondary');
  });
}
// 跟随系统变化
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (localStorage.getItem('tgp_theme') === 'system') applyTheme('system');
});
// 页面加载时应用已保存主题
(function() {
  const saved = localStorage.getItem('tgp_theme') || 'dark';
  applyTheme(saved);
})();

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(ts, showTime=false) {
  if (!ts) return '—';
  const d = new Date(ts*1000);
  const diff = Math.floor((Date.now()-ts*1000)/1000);
  if (!showTime && diff<3600) return Math.floor(diff/60)+'分钟前';
  if (!showTime && diff<86400) return Math.floor(diff/3600)+'小时前';
  return showTime ? d.toLocaleString('zh-CN') : d.toLocaleDateString('zh-CN');
}
function err(msg) { return `<div class="card p-6 text-red-400 text-sm">❌ 错误：${esc(msg)}</div>`; }
function copyText(text, label='内容') {
  navigator.clipboard.writeText(text).then(()=>toast(label+'已复制','ok')).catch(()=>toast('复制失败','err'));
}

async function deleteConn(id) {
  if (!confirm('确认删除此连接的本地记录？')) return;
  const r = await DEL('/api/connections/'+id);
  if (r.ok) { toast('已删除','ok'); await loadConnections(); navigate('home'); }
  else toast('删除失败: '+r.error,'err');

function openChat(chatId) { S.chatId=chatId; render(); }

async function renderMessages() {
  if (!S.conn||!S.chatId) return;
  const pc = document.getElementById('page-content');
  const res = await GET(`/api/connections/${S.conn.id}/chats/${S.chatId}/messages?limit=80`);
  if (!res.ok) { pc.innerHTML=err(res.error); return; }
  const msgs = res.result||[];
  pc.innerHTML = `
    <div class="flex items-center gap-3 mb-4">
      <button class="btn btn-ghost btn-sm" onclick="S.chatId=null;render()">← 返回</button>
      <span class="text-white font-medium">Chat ${S.chatId}</span>
      <button class="btn btn-danger btn-sm ml-auto" onclick="clearChat(${S.chatId})">清空记录</button>
    </div>
    <div class="card p-4 flex flex-col gap-2 min-h-64 max-h-[65vh] overflow-y-auto" id="msg-list">
      ${msgs.length?msgs.map(m=>msgBubble(m)).join(''):'<p class="text-slate-500 text-center py-8">暂无消息</p>'}
    </div>
    <div class="mt-4 flex gap-2">
      <input id="quick-text" class="input" placeholder="快速回复…"/>
      <button class="btn btn-primary" onclick="quickReply(${S.chatId})">发送</button>
    </div>`;
  const ml=document.getElementById('msg-list'); if(ml) ml.scrollTop=ml.scrollHeight;
}
function msgBubble(m) {
  const isOut = m.direction === 'outgoing';
  // 防御性处理：旧表可能缺列，content_type 为 undefined
  const ct = m.content_type ?? 'text';
  const ICONS = {photo:'📷',video:'🎥',document:'📄',audio:'🎵',voice:'🎙',sticker:'🎭',animation:'🎞'};
  const icon = ICONS[ct] ?? '';
  // text 优先，无 text 时用 content_type 提示，都没有则显示"空消息"
  const body = m.text || (ct !== 'text' ? `[${ct}]` : '[空消息]');
  const sender = m.from_name || (isOut ? 'Bot' : '用户');
  const ts = m.sent_at || 0;
  return `<div class="flex ${isOut?'flex-row-reverse':'flex-row'} items-end gap-2">
    <div class="${isOut?'chat-bubble-out':'chat-bubble-in'} px-3.5 py-2.5 text-sm" style="word-break:break-word">
      <p class="text-xs ${isOut?'text-blue-300':'text-blue-400'} mb-0.5 font-medium">${esc(sender)}</p>
      <p style="color:#f1f5f9">${icon}${icon?' ':''}${esc(body)}</p>
      <p class="text-xs mt-1 ${isOut?'text-blue-200':'text-slate-500'} text-right">${ts?fmtTime(ts,true):'—'}</p>
    </div></div>`;
}
async function quickReply(chatId) {
  const text=document.getElementById('quick-text')?.value?.trim();
  if (!text||!S.conn) return;
  const res=await POST('/api/sendMessage',{business_connection_id:S.conn.id,chat_id:chatId,text,parse_mode:'HTML'});
  if (res.ok) { toast('已发送','ok'); document.getElementById('quick-text').value=''; render(); }
  else toast('失败: '+(res.description||res.error),'err');
}
async function clearChat(chatId) {
  if (!confirm('确认清空聊天记录？')) return;
  const res=await api(`/api/connections/${S.conn.id}/chats/${chatId}/messages`,{method:'DELETE',body:'{}'});
  if (res.ok) { toast('已清空','ok'); S.chatId=null; render(); }
}

    </div>

        <select id="cr-tz" class="input">
          <option value="Asia/Shanghai" ${(r.timezone||'Asia/Shanghai')==='Asia/Shanghai'?'selected':''}>Asia/Shanghai</option>

function previewCron() {
  const el=document.getElementById('cr-preview'); if(!el)return;
  const expr=document.getElementById('cr-expr')?.value?.trim();
  if(!expr){el.textContent='';return;}
  const aliases=['@hourly','@daily','@midnight','@weekly','@monthly','@yearly'];
  if(aliases.includes(expr.toLowerCase())){el.textContent='✓ 别名格式';el.className='text-xs text-green-400 mt-1';return;}
  const parts=expr.split(/\s+/);
  if(parts.length===5){el.textContent=`✓ 分[${parts[0]}] 时[${parts[1]}] 日[${parts[2]}] 月[${parts[3]}] 周[${parts[4]}]`;el.className='text-xs text-green-400 mt-1';}
  else{el.textContent='✗ 需要5段（分 时 日 月 周）';el.className='text-xs text-red-400 mt-1';}
}

    {method:'POST',path:'/api/schedule/{id}/trigger',name:'手动立即触发',params:[],curl:`curl -X POST -H "X-Access-Password: YOUR_PWD" {BASE}/api/schedule/{id}/trigger`},

    {method:'POST',path:'/api/rules',name:'创建规则',params:[{n:'trigger_type',t:'string',r:true,d:'keyword|regex|all'},{n:'trigger_value',t:'string',r:false,d:'关键词或正则'},{n:'reply_text',t:'string',r:true,d:'回复内容'},{n:'priority',t:'number',r:false,d:'优先级，默认0'},{n:'connection_id',t:'string',r:false,d:'留空为全局规则'}],curl:`curl -X POST -H "X-Access-Password: YOUR_PWD" -H "Content-Type: application/json" \\\n  -d '{"trigger_type":"keyword","trigger_value":"价格","reply_text":"请查看官网","priority":10}' \\\n  {BASE}/api/rules`},
  ]},

async function renderDocs() {
  const pc=document.getElementById('page-content');
  const BASE=window.location.origin;
  pc.innerHTML=`<div class="flex flex-wrap gap-2 mb-6" id="doc-tabs">
    <button class="tab active" onclick="filterDocs(null,this)">全部</button>
    ${API_DOCS.map(c=>`<button class="tab" onclick="filterDocs('${c.cat}',this)">${c.icon} ${c.cat}</button>`).join('')}
  </div><div id="doc-list" class="space-y-3"></div>`;
  renderDocList(null,BASE);
}
function filterDocs(cat,btn) {
  document.querySelectorAll('#doc-tabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderDocList(cat,window.location.origin);
}
function renderDocList(filterCat,BASE) {
  const list=document.getElementById('doc-list');
  let html='';
  API_DOCS.forEach(section=>{
    if(filterCat&&section.cat!==filterCat)return;
    section.list.forEach(ep=>{
      const curlFinal=(ep.curl||'').replace(/\{BASE\}/g,BASE);
      const colors={GET:'badge-blue',POST:'badge-green',PUT:'badge-yellow',DELETE:'badge-red',ANY:'badge-gray'};
      html+=`<div class="card p-4">
        <div class="flex items-start justify-between gap-3 mb-2">
          <div><span class="badge ${colors[ep.method]||'badge-gray'} mr-2">${ep.method}</span><code class="text-sm text-blue-300 font-mono">${esc(ep.path)}</code><span class="text-xs text-slate-500 ml-2">${section.icon} ${section.cat}</span></div>
        </div>
        <p class="font-medium text-white text-sm mb-1">${ep.name}</p>
        ${ep.desc?`<p class="text-sm text-slate-400 mb-3">${ep.desc}</p>`:''}
        ${ep.params&&ep.params.length?`<table class="w-full text-xs mb-3 border border-slate-700 rounded"><thead><tr class="bg-slate-900"><th class="p-2 text-left text-slate-400">参数</th><th class="p-2 text-left text-slate-400">类型</th><th class="p-2 text-left text-slate-400">必填</th><th class="p-2 text-left text-slate-400">说明</th></tr></thead><tbody>${ep.params.map(p=>`<tr class="border-t border-slate-700"><td class="p-2 font-mono text-blue-300">${p.n}</td><td class="p-2 text-slate-400">${p.t}</td><td class="p-2">${p.r?'<span class="text-red-400">必填</span>':'<span class="text-slate-500">可选</span>'}</td><td class="p-2 text-slate-300">${p.d}</td></tr>`).join('')}</tbody></table>`:''}
        <div class="relative"><pre class="code-block text-xs">${esc(curlFinal)}</pre>
        <button class="btn btn-ghost btn-sm absolute top-2 right-2" onclick="copyText(\`${curlFinal.replace(/`/g,'\\`')}\`,'curl 命令')">复制</button></div>
      </div>`;
    });
  });
  list.innerHTML=html||'<p class="text-slate-400">无匹配内容</p>';
}

// ══════════════════════════════════════════════════════════════════
// 页面：操作日志
// ══════════════════════════════════════════════════════════════════
async function renderLogs() {
  const pc=document.getElementById('page-content');
  const cid=S.conn?.id;
  const res=await GET('/api/logs'+(cid?'?connection_id='+cid+'&limit=100':'?limit=100'));
  if(!res.ok){pc.innerHTML=err(res.error);return;}
  const{logs,stats,total}=res.result;
  const ac={auto_reply:'badge-blue',sendMessage:'badge-green',cron_sent:'badge-green',cron_failed:'badge-red',business_connection:'badge-yellow'};
  pc.innerHTML=`<div class="grid gap-4 lg:grid-cols-4 mb-4">
    <div class="card p-4 text-center"><p class="text-2xl font-bold text-white">${total}</p><p class="text-xs text-slate-400 mt-1">总记录数</p></div>
    ${(stats||[]).slice(0,6).map(s=>`<div class="card p-3 text-center"><p class="text-lg font-bold ${s.result==='ok'?'text-green-400':'text-red-400'}">${s.count}</p><p class="text-xs text-slate-400 truncate">${esc(s.action)}</p><span class="badge ${s.result==='ok'?'badge-green':'badge-red'} text-xs">${s.result}</span></div>`).join('')}
  </div>
  <div class="space-y-2">${(logs||[]).map(log=>`<div class="card p-3 flex items-start gap-3">
    <span class="badge ${log.result==='ok'?'badge-green':'badge-red'} shrink-0 mt-0.5">${log.result}</span>
    <div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap">
      <span class="badge ${ac[log.action]||'badge-gray'} text-xs">${esc(log.action)}</span>
      <span class="text-xs text-slate-500 ml-auto">${fmtTime(log.created_at,true)}</span></div>
      ${log.error_msg?`<p class="text-xs text-red-400 mt-1">${esc(log.error_msg)}</p>`:''}
      ${log.detail?`<p class="text-xs text-slate-500 mt-0.5 truncate">${esc(log.detail.slice(0,120))}</p>`:''}
    </div></div>`).join('')||'<div class="card p-6 text-center text-slate-400">暂无日志</div>'}
  </div>`;
}

// ══════════════════════════════════════════════════════════════════
// 页面：系统设置
// ══════════════════════════════════════════════════════════════════
async function renderSettings() {
  const pc=document.getElementById('page-content');
  pc.innerHTML='<div class="flex justify-center py-8"><span class="spinner" style="width:2rem;height:2rem;border-width:3px"></span></div>';
  const res=await GET('/api/setup');
  if(!res.ok&&!res.result){pc.innerHTML=err(res.error||'加载失败');return;}
  const{bot,webhook,db}=res.result||{};
  const dbInit=db?.initialized!==false;
  const whOk=webhook?.ok===true;
  pc.innerHTML=`<div class="grid gap-4 lg:grid-cols-2">
    <div class="card p-5">
      <h3 class="font-semibold text-white mb-4">🤖 Bot 信息</h3>
      ${bot?`<div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-slate-400">名称</span><span class="text-white font-medium">${esc(bot.first_name||'')}</span></div>
        <div class="flex justify-between"><span class="text-slate-400">用户名</span><span class="text-blue-400">@${esc(bot.username||'')}</span></div>
        <div class="flex justify-between"><span class="text-slate-400">Bot ID</span><span class="font-mono text-slate-300">${bot.id}</span></div>
        <div class="flex justify-between"><span class="text-slate-400">Business 支持</span><span class="${bot.can_connect_to_business?'text-green-400':'text-red-400'}">${bot.can_connect_to_business?'✓ 已开启':'✗ 未开启'}</span></div>
      </div>`:'<p class="text-red-400 text-sm">无法获取 Bot 信息，请检查 BOT_TOKEN</p>'}
    </div>
    <div class="card p-5">
      <h3 class="font-semibold mb-4" style="color:var(--text)">🎨 显示主题</h3>
      <div class="flex gap-2 mb-2">
        <button id="theme-dark"   onclick="setTheme('dark')"   class="btn btn-secondary flex-1 justify-center">🌙 深色</button>
        <button id="theme-light"  onclick="setTheme('light')"  class="btn btn-secondary flex-1 justify-center">☀️ 浅色</button>
        <button id="theme-system" onclick="setTheme('system')" class="btn btn-secondary flex-1 justify-center">💻 跟随系统</button>
      </div>
      <p id="theme-current" class="text-xs text-center" style="color:var(--text-muted)"></p>
    </div>
    <div class="card p-5">
      <h3 class="font-semibold text-white mb-4">🔑 认证方式</h3>
      <div class="space-y-3 text-sm">
        <div class="bg-slate-900 rounded p-3">
          <p class="text-slate-400 text-xs mb-1">浏览器 UI（Cookie，自动）</p>
          <code class="text-xs text-green-400">✓ 当前已通过 Cookie 认证</code>
        </div>
        <div class="bg-slate-900 rounded p-3">
          <p class="text-slate-400 text-xs mb-1">curl / API 客户端（Header）</p>
          <code class="text-xs text-slate-300">X-Access-Password: YOUR_PASSWORD</code>
        </div>
      </div>
    </div>
    <div class="card p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-white">🗄️ 数据库</h3>
        <span class="badge ${dbInit?'badge-green':'badge-red'}">${dbInit?'✓ 已就绪':'✗ 未初始化'}</span>
      </div>
      ${dbInit?`<div class="grid grid-cols-2 gap-2 mb-4">
        ${[['📡 连接',db.connections],['💬 消息',db.messages],['⏰ Cron',db.active_cron_rules],['🤖 回复',db.active_rules]].map(([l,v])=>`
        <div class="bg-slate-900 rounded p-2.5 text-center"><p class="text-lg font-bold text-white">${v>=0?v:'?'}</p><p class="text-xs text-slate-400">${l}</p></div>`).join('')}
      </div>`:`<p class="text-sm text-slate-400 mb-4">数据库表尚未创建，点击下方按钮完成初始化。</p>`}
      <button class="btn btn-primary w-full justify-center" onclick="doInitDB(this)">
        ${dbInit?'↻ 重新初始化数据库':'🚀 初始化数据库'}
      </button>
    </div>
    <div class="card p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-white">🔗 Webhook</h3>
        <span class="badge ${whOk?'badge-green':'badge-red'}">${whOk?'✓ 已注册':'✗ 未注册'}</span>
      </div>
      <div class="space-y-2 text-sm mb-4">
        <div><p class="text-slate-400 text-xs mb-0.5">当前注册地址</p>
          <code class="text-xs ${whOk?'text-green-400':'text-slate-500'} break-all">${esc(webhook?.current||'未设置')}</code></div>
        <div><p class="text-slate-400 text-xs mb-0.5">应注册到</p>
          <code class="text-xs text-slate-300 break-all">${esc(webhook?.expected||'')}</code></div>
        ${webhook?.last_error_message?`<p class="text-xs text-red-400">错误：${esc(webhook.last_error_message)}</p>`:''}
      </div>
      <button class="btn btn-primary w-full justify-center" onclick="doInitWebhook(this)">
        ${whOk?'↻ 重新注册 Webhook':'🚀 注册 Webhook'}
      </button>
    </div>
  </div>`;
  setTimeout(syncThemeBtns, 50); // 同步主题按钮状态
}

// renderSettings 打开时同步主题按钮状态（需在 innerHTML 之后执行）
function syncThemeBtns() {
  const t = localStorage.getItem('tgp_theme') || 'dark';
  const labels = {dark:'当前：深色模式',light:'当前：浅色模式',system:'当前：跟随系统'};
  ['dark','light','system'].forEach(name => {
    const btn = document.getElementById('theme-'+name);
    if (btn) btn.className = 'btn flex-1 justify-center ' + (name===t ? 'btn-primary' : 'btn-secondary');
  });
  const el = document.getElementById('theme-current');
  if (el) el.textContent = labels[t] || '';
}

async function doInitDB(btn) {
  const orig=btn.textContent; btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 创建中…';
  const res=await POST('/api/setup/db',{});
  btn.disabled=false; btn.textContent=orig;
  if(res.ok){toast('数据库初始化成功','ok');render();}
  else{const failed=(res.result?.results||[]).filter(t=>!t.ok);toast('失败：'+(failed.map(t=>t.name+': '+t.error).join(', ')||res.error),'err');}
}
async function doInitWebhook(btn) {
  const orig=btn.textContent; btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 注册中…';
  const res=await POST('/api/setup/webhook',{});
  btn.disabled=false; btn.textContent=orig;
  if(res.ok){toast('Webhook 注册成功','ok');render();}
  else toast('失败：'+(res.result?.error||res.error||'未知'),'err');
}
</script>
